<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | IDSC</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loader"><span>IDSC.</span></div>
<div id="page-transition"></div>
<div class="cursor-glow"></div>

<main>
    <div class="split">
        <div class="split-visual">
            <div class="bg-fx" style="position:absolute;"><div class="blob blob-1"></div><div class="blob blob-3"></div></div>
            <a href="index.html" class="brand" style="position:relative; z-index:2; margin-bottom:60px;">IDSC<span class="brand-dot">.</span></a>
            <h1 style="position:relative; z-index:2; font-size:clamp(2rem,4vw,3rem); margin-bottom:20px;">Welcome Back, <span class="gradient">Builder.</span></h1>
            <p style="position:relative; z-index:2; color:var(--text-muted); max-width:420px; line-height:1.7;">Log in to access your member dashboard, project teams and the community chat.</p>
        </div>
        <div class="split-form">
            <div class="auth-box reveal-right in">
                <div class="card">
                    <h2 style="font-size:1.8rem; margin-bottom:8px;">Member Login</h2>
                    <p style="color:var(--text-muted); margin-bottom:28px; font-size:0.92rem;">Enter your credentials to continue.</p>
                    <form>
                        <div class="form-group">
                            <label for="lEmail">Email Address</label>
                            <input id="lEmail" type="email" class="form-control" placeholder="you@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="lPass">Password</label>
                            <input id="lPass" type="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="checkbox-row">
                            <label style="display:flex; align-items:center; gap:8px; margin:0; color:var(--text-muted);"><input type="checkbox"> Remember me</label>
                            <a href="#">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn-primary" style="width:100%; padding:15px;">Log In</button>
                    </form>
                    <p class="switch-link">Don't have an account? <a href="join.html">Join IDSC</a></p>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
